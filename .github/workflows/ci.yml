name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff pytest pytest-cov

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest tests/ --cov=. --cov-report=term-missing -q
